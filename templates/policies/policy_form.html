{% extends "base.html" %}
{% load static %}

{% block title %}Add Policy{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/customer_form.css' %}">
{% endblock %}

{% block content %}

<div class="page-wrapper">
  <div class="form-card">

        <h2>Add Policy</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="{% url 'add_policy' %}" enctype="multipart/form-data" onsubmit="return validatePolicyForm()">
            {% csrf_token %}

            <div class="form-grid">

                <!-- Policy Name -->
                <div>
                    <label>Policy Name</label>
                    <input type="text"
                    id="policy_name"
                           name="policy_name"
                           placeholder="Enter Policy Name">
                        <span class="error" id="policy_name_error"></span>
                </div>

                <!-- Premium Amount -->
                <div>
                    <label>Premium Amount</label>
                    <input type="number"
                    id="premium_amount"
                           name="premium_amount"
                           placeholder="Enter Premium Amount"
                           step="0.01">
                           <span class="error" id="premium_amount_error"></span>
                          
                </div>

                <!-- Duration -->
                <div>
                    <label>Duration (Months)</label>
                    <input type="number"
                           name="duration_month"
                           id="duration_month"
                           placeholder="Enter Duration in Months"
                           >
                           <span class="error" id="duration_month_error"></span>
                </div>

                <!-- Description -->
                <div style="grid-column: span 2;">
                    <label>Description</label>
                    <textarea name="description"
                              rows="3"
                              placeholder="Enter Policy Description"
                              style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;"></textarea>
                </div>

            </div>
            <div class="clear-fix">
            <button type="submit" class="save-btn">
                Save Policy
            </button>
        </div>

        </form>

    </div>
</div>

{% endblock %}
{% block extra_js %}
<script src="{% static 'policies/policy_form.js' %}"></script>
{% endblock %}
