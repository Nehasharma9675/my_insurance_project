{% extends "base.html" %}
{% load static %}

{% block title %}Purchase Policy{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/purchase_form.css' %}">
{% endblock %}

{% block content %}
<div class="page-wrapper">
  <div class="form-card">

        <h2>Purchase Policy</h2>

        <form method="post" action="{% url 'purchase_add' %}" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-grid">

                <!-- Customer Dropdown -->
                <div>
                    <label>Select Customer</label>
                    <select name="customer" class="form-select" required>
                        <option value="">Select Customer</option>
                        {% for c in customers %}
                        <option value="{{ c.id }}">
                            {{ c.user.username }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Policy Dropdown -->
                <div>
                    <label>Select Policy</label>
                    <select name="policy" class="form-select" required>
                        <option value="">Select Policy</option>
                        {% for p in policies %}
                        <option value="{{ p.id }}">
                            {{ p.policy_name }} (₹ {{ p.premium_amount }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Premium Paid -->
                <div>
                    <label>Premium Paid</label>
                    <input type="number" step="0.01"
                           name="premium_paid"
                           placeholder="Enter Paid Amount"
                           required>
                </div>

            </div>
              <div class="clear-fix">
            <button type="submit" class="save-btn">
                Purchase Policy
            </button>
        </div>

        </form>

    </div>
</div>

{% endblock %}
