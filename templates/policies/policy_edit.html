{% extends "base.html" %}
{% load static %}

{% block title %}Edit Policy{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/customer_form.css' %}">
{% endblock %}

{% block content %}

<div class="page-wrapper">
  <div class="form-card">

        <h2>Edit Policy</h2>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post"
              action="{% url 'policy_edit' policy.id %}"
              onsubmit="return validatePolicyForm()">

            {% csrf_token %}

            <div class="form-grid">

                <!-- Policy Name -->
                <div>
                    <label>Policy Name</label>
                    <input type="text"
                           id="policy_name"
                           name="policy_name"
                           value="{{ policy.policy_name }}"
                           required>
                    <span id="policy_name_error" class="error"></span>
                </div>

                <!-- Premium -->
                <div>
                    <label>Premium Amount</label>
                    <input type="number"
                           id="premium_amount"
                           name="premium_amount"
                           step="0.01"
                           value="{{ policy.premium_amount }}"
                           required>
                    <span id="premium_amount_error" class="error"></span>
                </div>

                <!-- Duration -->
                <div>
                    <label>Duration (Months)</label>
                    <input type="number"
                           id="duration_month"
                           name="duration_month"
                           value="{{ policy.duration_month }}"
                           required>
                    <span id="duration_month_error" class="error"></span>
                </div>

                <!-- Description -->
                <div style="grid-column: span 2;">
                    <label>Description</label>
                    <textarea name="description"
                              rows="3"
                              style="width:100%; padding:10px; border-radius:6px; border:1px solid #ccc;">{{ policy.description }}</textarea>
                </div>

            </div>
            <div class="clear-fix">
            <button type="submit" class="save-btn">
                Update Policy
            </button>
        </div>
        </form>

    </div>
</div>

{% endblock %}

{% block extra_js %}
<script src="{% static 'policies/policy_form.js' %}"></script>
{% endblock %}
